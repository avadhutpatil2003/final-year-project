<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .logo-container { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        img { max-width: 300px; height: auto; }
    </style>
</head>
<body>
    <h1>Company Logos Test</h1>
    
    <div class="logo-container">
        <h2>JMS Group Logo</h2>
        <img src="jms-logo.svg" alt="JMS Group Logo">
        <p>Path: /assets/logos/jms-logo.svg</p>
    </div>
    
    <div class="logo-container">
        <h2>Jay Maharashtra Security Logo</h2>
        <img src="jay-maharashtra-logo.svg" alt="Jay Maharashtra Security Logo">
        <p>Path: /assets/logos/jay-maharashtra-logo.svg</p>
    </div>
    
    <div class="logo-container">
        <h3>Usage in Salary Slip:</h3>
        <p>These logos will appear in:</p>
        <ul>
            <li>✅ Print function (browser print)</li>
            <li>⚠️ PDF function (shows placeholder text)</li>
        </ul>
    </div>
</body>
</html>
